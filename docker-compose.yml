services:
  postgres:
    image: postgres:17
    container_name: glamour-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: glamour_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: StrongPassword123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d glamour_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - glamour-network

  redis:
    image: redis:7-alpine
    container_name: glamour-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - glamour-network

volumes:
  postgres_data:
  redis_data:

networks:
  glamour-network:
    driver: bridge